name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Setup environment
      run: cp .env.prod .env

    - name: Install dependencies
      run: uv sync --extra tests

    - name: Run tests
      run: uv run pytest .
